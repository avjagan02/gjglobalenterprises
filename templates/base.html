<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or config.company_name }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f8f9fb; color: #333; }
    header, footer { background: #0b3d91; color: #fff; padding: 20px 24px; }
    nav a { color: #fff; margin-right: 16px; text-decoration: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .hero { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; align-items: center; }
    .hero img { width: 100%; border-radius: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 5px 20px rgba(0,0,0,.08); }
    .card h3 { margin-top: 0; }
    .contact-list { list-style: none; padding: 0; }
    .contact-list li { margin-bottom: 8px; }
    footer p { margin: 0; }
    .button { display: inline-block; padding: 10px 18px; border-radius: 6px; background: #ff8200; color: #fff; text-decoration: none; }
    .image-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .image-row img { width: 100%; border-radius: 10px; }
    form input, form textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 12px; }
    form button { padding: 12px 20px; background: #0b3d91; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>{{ config.company_name }}</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 {{ config.company_name }}. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
